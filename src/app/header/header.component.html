<header class="header">
  <div class="header-inner">
    <div class="brand-left" (click)="navigateTo('home')">
      <img src="/icon.png" alt="Before the Storm" class="brand-icon">
    </div>
    <div class="brand-center" (click)="navigateTo('home')">
      <span class="brand-text">BEFORE<span class="dot">·</span>THE<span class="dot">·</span>STORM</span>
    </div>
    <nav>
      <button
        class="nav-btn"
        [class.active]="activeRoute === 'home'"
        (click)="navigateTo('home')">
        Главная
      </button>
      <button
        class="nav-btn"
        [class.active]="activeRoute === 'reader'"
        (click)="navigateTo('reader')">
        Читать
      </button>
    </nav>
  </div>
</header>
